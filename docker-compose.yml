services:
  postgres:
    image: postgres:12.2-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - data:/var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 5

  nakama:
    build:
      context: .
      dockerfile: Dockerfile.nakama
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB} &&
        exec /nakama/nakama --name nakama1 --database.address postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB} --logger.level INFO --runtime.js_entrypoint "index.js"
    # Ports removed: handled by Caddy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7350/"]
      interval: 10s
      timeout: 5s
      retries: 5


  node-app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
    # Ports removed: handled by Caddy
    depends_on:
      nakama:
        condition: service_started
    environment:
      - PORT=5000
      - FRONTEND_URL=${FRONTEND_URL}
      - NAKAMA_HOST=nakama
      - NAKAMA_PORT=${NAKAMA_PORT}
      - NAKAMA_SERVER_KEY=${NAKAMA_SERVER_KEY}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - node-app
      - nakama

volumes:
  data:
    name: tic-tac-toe-postgres-data
  caddy_data:
  caddy_config:
