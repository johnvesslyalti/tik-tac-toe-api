services:
  postgres:
    image: postgres:12.2-alpine
    env_file: .env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - data:/var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 5

  nakama:
    build:
      context: .
      dockerfile: Dockerfile.nakama
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB} &&
        exec /nakama/nakama --name nakama1 --database.address postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB} --logger.level INFO --runtime.js_entrypoint "index.js" --socket.server_key "${NAKAMA_SOCKET_SERVER_KEY}" --runtime.http_key "${NAKAMA_SERVER_KEY}"
    ports:
      - "7350:7350"
      - "7351:7351"

  node-app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      nakama:
        condition: service_started
    env_file:
      - .env
    environment:
      - PORT=5000
    ports:
      - "5000:5000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - node-app
      - nakama

volumes:
  data:
    name: tic-tac-toe-postgres-data
  caddy_data:
  caddy_config:
